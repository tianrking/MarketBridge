# MarketBridge unified configuration
# Use with: MARKETBRIDGE_CONFIG=./config.yaml cargo run

runtime:
  # mpsc channel capacity between source tasks and aggregator.
  # Higher value handles bursts better, but uses more memory.
  queue_capacity: 4096

  # Per-domain broadcast ring buffer capacity for websocket/redis consumers.
  # Slow consumers skip their own stale messages instead of blocking publishers
  # or other subscribers.
  broadcast_capacity: 65536

  # Backpressure strategy when channel is full:
  # - drop_newest: low-latency priority, may drop some fresh ticks
  # - block: no drop, but producers may stall
  backpressure: drop_newest

  # Report cadence for aggregated output (milliseconds).
  # Ingest remains high-frequency; only output is throttled.
  report_interval_ms: 1000

  # Quote freshness TTL (milliseconds).
  # Quotes older than this are excluded from spread calculation.
  stale_ttl_ms: 1500

strategy:
  # Minimum net profit in quote currency (e.g., USDT) after fees/slippage.
  min_profit_usdt: 1.0

  # Minimum net spread in basis points after fees/slippage.
  # 1 bps = 0.01%
  min_profit_bps: 0.5

  # Opportunity must stay valid for at least this long before TRIGGER.
  # Helps avoid noisy one-tick false positives.
  min_signal_hold_ms: 500

  # Slippage buffer (bps) applied to both legs (buy + sell).
  # Conservative default for live trading realism.
  slippage_bps: 0.5

  # Fee mode used by spread calculation:
  # - taker: both legs cross the book
  # - maker: both legs rest passively
  # - maker_buy_taker_sell: passive entry, active exit
  # - taker_buy_maker_sell: active entry, passive exit
  fee_mode: taker

deribit:
  # Data-source cache for option IV used by downstream fair-value models.
  enabled: true
  base_url: "https://www.deribit.com/api/v2/"
  currencies: [BTC, ETH]
  refresh_secs: 10
  stale_ttl_ms: 30000

okx_options:
  # Public OKX option chain summary. Exposed through /v1/options/chains?venue=okx
  enabled: false
  base_url: "https://www.okx.com/api/v5/"
  currencies: [BTC, ETH]
  refresh_secs: 10

bybit_options:
  # Public Bybit option tickers. Exposed through /v1/options/chains?venue=bybit
  enabled: false
  base_url: "https://api.bybit.com/v5/"
  currencies: [BTC, ETH]
  refresh_secs: 10

binance_options:
  # Public Binance European options tickers and mark data.
  # Exposed through /v1/options/chains?venue=binance
  enabled: false
  base_url: "https://eapi.binance.com/"
  currencies: [BTC, ETH]
  refresh_secs: 10

polymarket:
  # Mature data-plane path: maintain a live CLOB cache for parsed BTC/ETH
  # binary markets. Disable if you only need exchange aggregation.
  enabled: true
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  gamma_base_url: "https://gamma-api.polymarket.com/"
  limit: 500
  max_offset: 5000
  refresh_secs: 300
  ping_secs: 10
  chunk_size: 500
  stale_ttl_ms: 1500

klines:
  # Stores historical REST candles and realtime tick-aggregated candles in SQLite.
  enabled: true
  sqlite_path: "data/marketbridge.sqlite"
  intervals: [1m, 5m, 15m, 1h]
  history_limit: 1500
  backfill_on_start: false
  sources: [binance, okx]

