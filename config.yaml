    pairs:
      - symbol: ETHUSDC
        network: 1
        src_token: "0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee"
        dest_token: "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48"
        amount: "1000000000000000000"
        src_decimals: 18
        dest_decimals: 6
        spread_bps: 5.0

# Global default symbol list (used when exchange.symbols is omitted).
# Format should be normalized symbols, e.g. BTCUSDT, ETHUSDT.
symbols: [BTCUSDT, ETHUSDT]

# Global default perp symbol list (used when exchange.perp_symbols is omitted).
perp_symbols: [BTCUSDT, ETHUSDT]

exchanges:
  okx:
    # Enable/disable this exchange source.
    enabled: true

    # Optional per-exchange symbol override.
    # If omitted, global "symbols" is used.
    symbols: [BTCUSDT, ETHUSDT]

    fee:
      # Fee model:
      # - fixed: one maker/taker fee level
      # - tiered: select fee by 30d volume and tiers
      mode: tiered

      # Your account's rolling 30d volume (USDT), used to select tier.
      volume_30d_usdt: 5000000

      # Fee tiers (bps). System picks the highest tier where
      # volume_30d_usdt >= min_volume_usdt.
      tiers:
        - min_volume_usdt: 0
          maker_bps: 8.0
          taker_bps: 10.0
        - min_volume_usdt: 1000000
          maker_bps: 6.0
          taker_bps: 8.0
        - min_volume_usdt: 5000000
          maker_bps: 4.0
          taker_bps: 6.0

  bitget:
    enabled: true
    # Optional perp override for this exchange
    perp_symbols: [BTCUSDT, ETHUSDT]
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      # Fixed fee level (bps) for your account.
      maker_bps: 8.0
      taker_bps: 10.0

  binance:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 7.5
      taker_bps: 7.5

  bybit:
    enabled: true
    # Optional perp override for this exchange
    perp_symbols: [BTCUSDT, ETHUSDT]
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 10.0
      taker_bps: 10.0

  coinbase:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 40.0
      taker_bps: 60.0

  kraken:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 25.0
      taker_bps: 40.0

  htx:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 20.0
      taker_bps: 20.0

  kucoin:
    enabled: true
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 10.0
      taker_bps: 10.0

  gate:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 15.0
      taker_bps: 15.0

  bitfinex:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 10.0
      taker_bps: 20.0

  hyperliquid:
    enabled: false
    # Hyperliquid uses coin symbols internally; registry maps BTCUSDT -> BTC.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 1.5
      taker_bps: 4.5

  dydx:
    enabled: false
    # dYdX v4 uses market ids like BTC-USDT; registry maps BTCUSDT -> BTC-USDT.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 1.0
      taker_bps: 5.0

  backpack:
    enabled: false
    symbols: [BTCUSDT, ETHUSDT]
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 8.0
      taker_bps: 10.0

  mexc:
    enabled: false
    symbols: [BTCUSDT, ETHUSDT]
    # MEXC contract API commonly uses BTC_USDT style ids.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 2.0
      taker_bps: 6.0

  bingx:
    enabled: false
    # BingX swap API commonly uses BTC-USDT style ids.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 2.0
      taker_bps: 5.0
