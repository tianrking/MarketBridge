# MarketBridge unified configuration
# Use with: MARKETBRIDGE_CONFIG=./config.yaml cargo run

runtime:
  # mpsc channel capacity between source tasks and aggregator.
  # Higher value handles bursts better, but uses more memory.
  queue_capacity: 4096

  # Backpressure strategy when channel is full:
  # - drop_newest: low-latency priority, may drop some fresh ticks
  # - block: no drop, but producers may stall
  backpressure: drop_newest

  # Report cadence for aggregated output (milliseconds).
  # Ingest remains high-frequency; only output is throttled.
  report_interval_ms: 1000

  # Quote freshness TTL (milliseconds).
  # Quotes older than this are excluded from spread calculation.
  stale_ttl_ms: 1500

strategy:
  # Minimum net profit in quote currency (e.g., USDT) after fees/slippage.
  min_profit_usdt: 1.0

  # Minimum net spread in basis points after fees/slippage.
  # 1 bps = 0.01%
  min_profit_bps: 0.5

  # Opportunity must stay valid for at least this long before TRIGGER.
  # Helps avoid noisy one-tick false positives.
  min_signal_hold_ms: 500

  # Slippage buffer (bps) applied to both legs (buy + sell).
  # Conservative default for live trading realism.
  slippage_bps: 0.5

deribit:
  # Data-source cache for option IV used by downstream fair-value models.
  enabled: true
  base_url: "https://www.deribit.com/api/v2/"
  currencies: [BTC, ETH]
  refresh_secs: 10
  stale_ttl_ms: 30000

polymarket:
  # Mature data-plane path: maintain a live CLOB cache for parsed BTC/ETH
  # binary markets. Disable if you only need exchange aggregation.
  enabled: true
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  gamma_base_url: "https://gamma-api.polymarket.com/"
  limit: 500
  max_offset: 5000
  refresh_secs: 300
  ping_secs: 10
  chunk_size: 500
  stale_ttl_ms: 1500

# Global default symbol list (used when exchange.symbols is omitted).
# Format should be normalized symbols, e.g. BTCUSDT, ETHUSDT.
symbols: [BTCUSDT, ETHUSDT]

# Global default perp symbol list (used when exchange.perp_symbols is omitted).
perp_symbols: [BTCUSDT, ETHUSDT]

exchanges:
  okx:
    # Enable/disable this exchange source.
    enabled: true

    # Optional per-exchange symbol override.
    # If omitted, global "symbols" is used.
    symbols: [BTCUSDT, ETHUSDT]

    fee:
      # Fee model:
      # - fixed: one maker/taker fee level
      # - tiered: select fee by 30d volume and tiers
      mode: tiered

      # Your account's rolling 30d volume (USDT), used to select tier.
      volume_30d_usdt: 5000000

      # Fee tiers (bps). System picks the highest tier where
      # volume_30d_usdt >= min_volume_usdt.
      tiers:
        - min_volume_usdt: 0
          maker_bps: 8.0
          taker_bps: 10.0
        - min_volume_usdt: 1000000
          maker_bps: 6.0
          taker_bps: 8.0
        - min_volume_usdt: 5000000
          maker_bps: 4.0
          taker_bps: 6.0

  bitget:
    enabled: true
    # Optional perp override for this exchange
    perp_symbols: [BTCUSDT, ETHUSDT]
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      # Fixed fee level (bps) for your account.
      maker_bps: 8.0
      taker_bps: 10.0

  binance:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 7.5
      taker_bps: 7.5

  bybit:
    enabled: true
    # Optional perp override for this exchange
    perp_symbols: [BTCUSDT, ETHUSDT]
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 10.0
      taker_bps: 10.0

  coinbase:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 40.0
      taker_bps: 60.0

  kraken:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 25.0
      taker_bps: 40.0

  htx:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 20.0
      taker_bps: 20.0

  kucoin:
    enabled: true
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 10.0
      taker_bps: 10.0

  gate:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 15.0
      taker_bps: 15.0

  bitfinex:
    enabled: false
    fee:
      mode: fixed
      maker_bps: 10.0
      taker_bps: 20.0

  hyperliquid:
    enabled: false
    # Hyperliquid uses coin symbols internally; registry maps BTCUSDT -> BTC.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 1.5
      taker_bps: 4.5

  dydx:
    enabled: false
    # dYdX v4 uses market ids like BTC-USDT; registry maps BTCUSDT -> BTC-USDT.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 1.0
      taker_bps: 5.0

  backpack:
    enabled: false
    symbols: [BTCUSDT, ETHUSDT]
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 8.0
      taker_bps: 10.0

  mexc:
    enabled: false
    symbols: [BTCUSDT, ETHUSDT]
    # MEXC contract API commonly uses BTC_USDT style ids.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 2.0
      taker_bps: 6.0

  bingx:
    enabled: false
    # BingX swap API commonly uses BTC-USDT style ids.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 2.0
      taker_bps: 5.0
