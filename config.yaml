# Global default symbol list (used when exchange.symbols is omitted).
# Format should be normalized symbols, e.g. BTCUSDT, ETHUSDT.
symbols: [BTCUSDT, ETHUSDT]

# Global default perp symbol list (used when exchange.perp_symbols is omitted).
perp_symbols: [BTCUSDT, ETHUSDT]

exchanges:
  okx:
    # Enable/disable this exchange source.
    enabled: true

    # Optional per-exchange symbol override.
    # If omitted, global "symbols" is used.
    symbols: [BTCUSDT, ETHUSDT]

    fee:
      # Fee model:
      # - fixed: one maker/taker fee level
      # - tiered: select fee by 30d volume and tiers
      mode: tiered

      # Your account's rolling 30d volume (USDT), used to select tier.
      volume_30d_usdt: 5000000

      # Fee tiers (bps). System picks the highest tier where
      # volume_30d_usdt >= min_volume_usdt.
      tiers:
        - min_volume_usdt: 0
          maker_bps: 8.0
          taker_bps: 10.0
        - min_volume_usdt: 1000000
          maker_bps: 6.0
          taker_bps: 8.0
        - min_volume_usdt: 5000000
          maker_bps: 4.0
          taker_bps: 6.0

  bitget:
    enabled: true
    # Optional perp override for this exchange
    perp_symbols: [BTCUSDT, ETHUSDT]
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      # Fixed fee level (bps) for your account.
      maker_bps: 8.0
      taker_bps: 10.0

  phemex:
    enabled: false
    symbols: []
    # Phemex linear perpetual public v2 endpoints use compact ids like BTCUSDT.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 1.0
      taker_bps: 6.0

  upbit:
    enabled: false
    # Upbit public REST uses quote-base ids; registry maps BTCUSDT -> USDT-BTC.
    symbols: [BTCUSDT, ETHUSDT, BTCKRW, ETHKRW]
    fee:
      mode: fixed
      maker_bps: 5.0
      taker_bps: 5.0

  bitmex:
    enabled: false
    symbols: []
    # Registry maps BTCUSDT -> XBTUSD and ETHUSDT -> ETHUSD.
    perp_symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: -2.5
      taker_bps: 7.5

  ascend_ex:
    enabled: false
    # AscendEX public WS uses BTC/USDT style ids; registry maps BTCUSDT -> BTC/USDT.
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 10.0
      taker_bps: 10.0

  bitrue:
    enabled: false
    symbols: [BTCUSDT, ETHUSDT]
    fee:
      mode: fixed
      maker_bps: 9.8
      taker_bps: 9.8

  bithumb:
    enabled: false
    # Bithumb public REST uses BTC_KRW style ids; registry maps BTCKRW -> BTC_KRW.
    symbols: [BTCKRW, ETHKRW]
    fee:
