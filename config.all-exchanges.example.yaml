    enabled: true
    base_url: "https://api.dexscreener.com/"
    poll_secs: 10
    pairs:
      - symbol: SOLUSDC
        chain_id: solana
        dex_id: meteora
        query: "SOL USDC"
        spread_bps: 5.0
