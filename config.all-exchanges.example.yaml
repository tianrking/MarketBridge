# Full-exchange example config for MarketBridge
# Usage:
#   MARKETBRIDGE_CONFIG=./config.all-exchanges.example.yaml cargo run
#
# Note:
# - This file enables all currently implemented exchanges in this project.
# - Coinbase is spot-only in this project (no perp adapter yet).
# - Kraken perp symbol naming is venue-specific; adjust perp_symbols to your account/venue.

runtime:
  queue_capacity: 8192
  router_publish_queue_capacity: 8192
  broadcast_capacity: 65536
  backpressure: drop_newest
  report_interval_ms: 1000
  stale_ttl_ms: 2000
  api_addr: 0.0.0.0:8080
  # redis_url: redis://127.0.0.1:6379
  redis_stream_prefix: ticks
  redis_dead_letter_path: "data/redis_dead_letters.jsonl"
  order_flow_large_trade_notional_usdt: 100000.0
  ws_send_timeout_ms: 3000

strategy:
  min_profit_usdt: 1.0
  min_profit_bps: 0.5
  min_signal_hold_ms: 500
  slippage_bps: 0.5
  book_signal_notional_usdt: 1000.0
  fallback_maker_fee_bps: 2.0
  fallback_taker_fee_bps: 10.0

klines:
  enabled: true
  sqlite_path: "data/marketbridge.sqlite"
  intervals: [1m, 5m, 15m, 1h]
  history_limit: 1500
  backfill_on_start: false
  sources: [binance, okx]

onchain:
  whale_alert:
    enabled: false
    api_key_env: WHALE_ALERT_API_KEY
    poll_secs: 60
    min_value_usd: 500000
  mempool_space:
    enabled: false
    poll_secs: 60
    min_value_btc: 100
  etherscan:
    enabled: false
    api_key_env: ETHERSCAN_API_KEY
    poll_secs: 60
    min_value_eth: 1000
    addresses: []

# Global defaults (spot/perp), can be overridden per exchange below.
symbols: [BTCUSDT, ETHUSDT]
perp_symbols: [BTCUSDT, ETHUSDT]

defi:
