# Minimal config: edit only these fields first.

runtime:
  queue_capacity: 4096
  backpressure: drop_newest
  report_interval_ms: 1000
  stale_ttl_ms: 1500

strategy:
  # Relaxed thresholds for quick testing (easier to see TRIGGER)
  min_profit_usdt: -1000.0
  min_profit_bps: -100.0
  min_signal_hold_ms: 0
  slippage_bps: 0.0

deribit:
  enabled: false
  base_url: "https://www.deribit.com/api/v2/"
  currencies: [BTC, ETH]
  refresh_secs: 10
  stale_ttl_ms: 30000

polymarket:
  enabled: false
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  gamma_base_url: "https://gamma-api.polymarket.com/"
  limit: 500
  max_offset: 500
  refresh_secs: 300
  ping_secs: 10
  chunk_size: 500
  stale_ttl_ms: 1500

symbols: [BTCUSDT]

exchanges:
  okx:
    enabled: true
    fee:
      mode: fixed
      maker_bps: 0.0
      taker_bps: 0.0

  bitget:
    enabled: true
    fee:
      mode: fixed
      maker_bps: 0.0
      taker_bps: 0.0
