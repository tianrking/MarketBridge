# Minimal config: edit only these fields first.

runtime:
  queue_capacity: 4096
  router_publish_queue_capacity: 4096
  broadcast_capacity: 65536
  event_bus_shards: 1
  backpressure: drop_newest
  report_interval_ms: 1000
  stale_ttl_ms: 1500
  ws_send_timeout_ms: 3000
  api_key_env: MARKETBRIDGE_API_KEY
  api_rate_limit_per_minute: 0
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "https://*.pages.dev"
      - "https://*.vercel.app"
    allow_private_network: true
    max_age_secs: 600
  order_flow_large_trade_notional_usdt: 100000.0
  redis_dead_letter_path: "data/redis_dead_letters.jsonl"
  clickhouse:
    enabled: false
    url: "http://127.0.0.1:8123"
    database: "marketbridge"
    password_env: CLICKHOUSE_PASSWORD
    batch_max: 1000
    flush_ms: 250
    local_buffer: 100000
    init_tables: true

strategy:
  # Relaxed thresholds for quick testing (easier to see TRIGGER)
  min_profit_usdt: -1000.0
  min_profit_bps: -100.0
  min_signal_hold_ms: 0
  slippage_bps: 0.0
  book_signal_notional_usdt: 1000.0
  fallback_maker_fee_bps: 2.0
  fallback_taker_fee_bps: 10.0

deribit:
  enabled: false
  base_url: "https://www.deribit.com/api/v2/"
  currencies: [BTC, ETH]
  refresh_secs: 10
  stale_ttl_ms: 30000

polymarket:
  enabled: false
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  gamma_base_url: "https://gamma-api.polymarket.com/"
  limit: 500
  max_offset: 500
  refresh_secs: 300
  ping_secs: 10
  chunk_size: 500
  stale_ttl_ms: 1500

klines:
  enabled: true
  sqlite_path: "data/marketbridge.sqlite"
  intervals: [1m, 5m]
  history_limit: 500
  backfill_on_start: false
  sources: [binance, okx]

onchain:
  whale_alert:
    enabled: false
    api_key_env: WHALE_ALERT_API_KEY
    min_value_usd: 500000
  mempool_space:
    enabled: false
    min_value_btc: 100
  etherscan:
    enabled: false
    api_key_env: ETHERSCAN_API_KEY
    min_value_eth: 1000
    safe_confirmations: 12
    request_delay_ms: 250
    addresses: []

symbols: [BTCUSDT]

exchanges:
  okx:
    enabled: true
    fee:
      mode: fixed
      maker_bps: 0.0
      taker_bps: 0.0

  bitget:
    enabled: true
    fee:
      mode: fixed
      maker_bps: 0.0
      taker_bps: 0.0
